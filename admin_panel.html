<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - HatiTiga</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a', 950: '#172554' } }
                }
            }
        }
    </script>
    <script src="js/mock_data.js"></script>
    <script>
        // ROUTE GUARD (Security)
        const session = localStorage.getItem('webkilat_session_v1');
        let user = null;
        if (session) {
            try {
                user = JSON.parse(session);
            } catch (e) {}
        }
        
        if (!user || user.role !== 'admin' || !user.verified) {
            alert('Akses Ditolak. Anda bukan Admin terverifikasi.');
            window.location.href = 'index.html';
        }
    </script>
    <style>
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 text-white flex flex-col flex-shrink-0">
        <div class="p-6 border-b border-slate-800 flex items-center gap-3">
            <img src="HatiTiga_Logo.png" alt="HatiTiga Logo" class="w-8 h-8 rounded object-contain bg-white">
            <span class="font-black text-xl tracking-tight" translate="no">HatiTiga Admin</span>
        </div>
        <nav class="flex-grow p-4 space-y-2">
            <button onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-btn w-full flex items-center gap-3 px-4 py-3 bg-brand-600 rounded-xl font-bold text-sm transition"><i class="fa-solid fa-house w-5"></i> Dashboard</button>
            <button onclick="switchTab('orders')" id="nav-orders" class="nav-btn w-full flex items-center gap-3 px-4 py-3 hover:bg-slate-800 text-slate-300 hover:text-white rounded-xl font-medium text-sm transition"><i class="fa-solid fa-cart-shopping w-5"></i> Order Manager</button>
            <button onclick="switchTab('templates')" id="nav-templates" class="nav-btn w-full flex items-center gap-3 px-4 py-3 hover:bg-slate-800 text-slate-300 hover:text-white rounded-xl font-medium text-sm transition"><i class="fa-solid fa-palette w-5"></i> Template Manager</button>
            <button class="w-full flex items-center justify-between px-4 py-3 hover:bg-slate-800 text-slate-300 hover:text-white rounded-xl font-medium text-sm transition opacity-50 cursor-not-allowed" title="Segera Hadir di Versi Berikutnya">
                <div class="flex items-center gap-3"><i class="fa-solid fa-wand-magic-sparkles w-5"></i> Website Editor</div>
                <i class="fa-solid fa-lock text-xs"></i>
            </button>
            <button onclick="switchTab('pending_updates')" id="nav-pending_updates" class="nav-btn w-full flex items-center justify-between px-4 py-3 hover:bg-slate-800 text-slate-300 hover:text-white rounded-xl font-medium text-sm transition relative">
                <div class="flex items-center gap-3"><i class="fa-solid fa-code-pull-request w-5"></i> Pending Updates</div>
                <div id="pending-badge" class="hidden bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">New</div>
            </button>
            <button class="w-full flex items-center justify-between px-4 py-3 hover:bg-slate-800 text-slate-300 hover:text-white rounded-xl font-medium text-sm transition opacity-50 cursor-not-allowed">
                <div class="flex items-center gap-3"><i class="fa-solid fa-users w-5"></i> Customers</div>
                <i class="fa-solid fa-lock text-xs"></i>
            </button>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <button onclick="window.resetDemoData()" class="w-full py-2 mb-4 bg-slate-800 border border-slate-700 text-slate-400 hover:text-white hover:bg-red-900/50 rounded-lg text-xs font-bold transition flex justify-center items-center gap-2">
                <i class="fa-solid fa-rotate-left"></i> Reset Demo Data
            </button>
        <div class="p-4 border-t border-slate-800">
            <div class="flex items-center gap-3 mb-4 px-2">
                <div class="w-8 h-8 bg-brand-800 text-brand-200 rounded-full flex items-center justify-center font-bold text-sm">A</div>
                <div class="flex flex-col">
                    <span class="text-sm font-bold truncate" id="admin-name">Admin</span>
                    <span class="text-[10px] text-green-400 font-bold uppercase"><i class="fa-solid fa-check-circle"></i> Verified</span>
                </div>
            </div>
            <button onclick="handleLogout()" class="w-full py-2.5 text-center text-sm font-bold text-red-400 hover:text-red-300 hover:bg-slate-800 rounded-lg transition">Logout</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col h-full overflow-hidden">
        <!-- Header -->
        <header class="bg-white border-b border-slate-200 h-16 flex items-center px-8 justify-between flex-shrink-0 shadow-sm z-10">
            <h2 class="text-lg font-bold text-slate-800" id="header-title">Dashboard Overview</h2>
            <div class="flex gap-3">
                <button onclick="window.open('index.html', '_blank')" class="px-4 py-2 bg-slate-100 text-slate-600 rounded-lg text-sm font-bold hover:bg-slate-200 transition"><i class="fa-solid fa-external-link-alt mr-2"></i>Lihat Web Publik</button>
            </div>
        </header>

        <!-- Content Area -->
        <div id="content-area" class="flex-grow overflow-y-auto p-8 bg-slate-50 relative">
            <!-- Tabs will be rendered here -->
        </div>
    </main>

    <script>
        document.getElementById('admin-name').innerText = user.username;

        function handleLogout() {
            localStorage.removeItem('webkilat_session_v1');
            window.location.href = 'index.html';
        }

        function switchTab(tabId) {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-brand-600', 'font-bold', 'text-white');
                btn.classList.add('hover:bg-slate-800', 'text-slate-300', 'font-medium');
            });
            const activeBtn = document.getElementById('nav-' + tabId);
            if(activeBtn) {
                activeBtn.classList.add('bg-brand-600', 'font-bold', 'text-white');
                activeBtn.classList.remove('hover:bg-slate-800', 'text-slate-300', 'font-medium');
            }

            const contentArea = document.getElementById('content-area');
            if (tabId === 'dashboard') {
                document.getElementById('header-title').innerText = "Dashboard Overview";
                renderDashboard(contentArea);
            } else if (tabId === 'orders') {
                document.getElementById('header-title').innerText = "Order Manager";
                renderOrderManager(contentArea);
            } else if (tabId === 'templates') {
                document.getElementById('header-title').innerText = "Template Manager";
                renderTemplateManager(contentArea);
            } else if (tabId === 'pending_updates') {
                document.getElementById('header-title').innerText = "Pending Customer Updates";
                renderPendingUpdates(contentArea);
            }
        }

        function renderDashboard(container) {
            container.innerHTML = `
                <div class="fade-in">
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                            <p class="text-slate-500 text-sm font-bold uppercase mb-2">Total Orders</p>
                            <h3 class="text-3xl font-black text-slate-900">${mockData.stats.totalOrders}</h3>
                        </div>
                        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                            <p class="text-slate-500 text-sm font-bold uppercase mb-2">Active Projects</p>
                            <h3 class="text-3xl font-black text-brand-600">${mockData.stats.activeProjects}</h3>
                        </div>
                        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                            <p class="text-slate-500 text-sm font-bold uppercase mb-2">Pending Revisions</p>
                            <h3 class="text-3xl font-black text-amber-500">${mockData.stats.pendingRevisions}</h3>
                        </div>
                        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                            <p class="text-slate-500 text-sm font-bold uppercase mb-2">Total Revenue</p>
                            <h3 class="text-3xl font-black text-green-600">${mockData.stats.revenue}</h3>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderOrderManager(container) {
            container.innerHTML = `
                <div class="fade-in bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                    <div class="px-6 py-5 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                        <h2 class="text-lg font-bold text-slate-800">Daftar Order Customer</h2>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="border-b border-slate-200">
                                    <th class="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">ID Order</th>
                                    <th class="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Customer</th>
                                    <th class="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Template</th>
                                    <th class="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Tanggal</th>
                                    <th class="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Status</th>
                                    <th class="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Action</th>
                                </tr>
                            </thead>
                            <tbody class="text-sm">
                                ${mockData.orders.map(o => `
                                <tr class="border-b border-slate-100 hover:bg-slate-50">
                                    <td class="p-4 font-bold text-slate-700">${o.id}</td>
                                    <td class="p-4 text-slate-600">${o.customer}</td>
                                    <td class="p-4 text-slate-600">${o.template}</td>
                                    <td class="p-4 text-slate-600">${o.date}</td>
                                    <td class="p-4">
                                        <span class="px-2.5 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider ${o.status === 'In Progress' ? 'bg-blue-100 text-blue-700' : o.status === 'Pending Payment' ? 'bg-slate-200 text-slate-700' : 'bg-amber-100 text-amber-700'}">${o.status}</span>
                                    </td>
                                    <td class="p-4">
                                        <button class="px-3 py-1.5 bg-brand-50 border border-brand-200 rounded text-xs font-bold text-brand-700 hover:bg-brand-100 transition shadow-sm mr-2">Detail</button>
                                        <button class="px-3 py-1.5 bg-white border border-slate-300 rounded text-xs font-bold text-slate-700 hover:bg-slate-100 transition shadow-sm" title="Website Editor (Segera)">Editor</button>
                                    </td>
                                </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderTemplateManager(container) {
            const getStatusBadge = (status) => {
                if(status === 'published') return '<span class="px-2 py-1 bg-green-100 text-green-700 rounded text-[10px] font-bold uppercase tracking-wider"><i class="fa-solid fa-eye mr-1"></i> Published</span>';
                if(status === 'draft') return '<span class="px-2 py-1 bg-slate-200 text-slate-700 rounded text-[10px] font-bold uppercase tracking-wider"><i class="fa-solid fa-pen mr-1"></i> Draft</span>';
                if(status === 'archived') return '<span class="px-2 py-1 bg-red-100 text-red-700 rounded text-[10px] font-bold uppercase tracking-wider"><i class="fa-solid fa-box-archive mr-1"></i> Archived</span>';
                return '';
            };

            container.innerHTML = `
                <div class="fade-in">
                    <div class="flex justify-between items-center mb-6">
                        <p class="text-slate-500">Kelola master template yang ditampilkan di Katalog User.</p>
                        <button class="px-4 py-2 bg-brand-600 text-white font-bold rounded-lg hover:bg-brand-700 transition shadow-sm"><i class="fa-solid fa-plus mr-2"></i> Tambah Template Baru</button>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6" id="template-list-container">
                        ${DB.templates.map((t, idx) => `
                            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col">
                                <div class="flex justify-between items-start mb-4">
                                    <div>
                                        <h3 class="text-lg font-bold text-slate-900">${t.name}</h3>
                                        <p class="text-sm text-brand-600 font-medium">${t.category} &bull; ${t.style}</p>
                                    </div>
                                    ${getStatusBadge(t.status || 'published')}
                                </div>
                                <p class="text-sm text-slate-600 mb-6 flex-grow">${t.description}</p>
                                
                                <div class="flex items-center gap-2 mt-auto border-t border-slate-100 pt-4">
                                    <button class="flex-1 py-2 bg-slate-50 border border-slate-200 text-slate-700 font-bold rounded-lg text-sm hover:bg-slate-100 transition"><i class="fa-solid fa-pen mr-1"></i> Edit</button>
                                    <button onclick="toggleTemplateStatus(${idx})" class="flex-1 py-2 ${t.status === 'draft' ? 'bg-green-50 border border-green-200 text-green-700 hover:bg-green-100' : 'bg-amber-50 border border-amber-200 text-amber-700 hover:bg-amber-100'} font-bold rounded-lg text-sm transition">
                                        ${t.status === 'draft' ? '<i class="fa-solid fa-upload mr-1"></i> Publish' : '<i class="fa-solid fa-eye-slash mr-1"></i> Jadikan Draft'}
                                    </button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        window.toggleTemplateStatus = function(index) {
            const t = DB.templates[index];
            if (t.status === 'published') {
                t.status = 'draft';
            } else {
                t.status = 'published';
            }
            
            localStorage.setItem('hatitiga_templates_db', JSON.stringify(DB.templates));
            renderTemplateManager(document.getElementById('content-area'));
        }

        // --- PENDING UPDATES LOGIC ---
        function renderPendingUpdates(container) {
            const projects = window.loadCustomerProjects ? window.loadCustomerProjects() : [];
            const pendingProjects = projects.filter(p => p.pendingUpdate && p.pendingUpdate.status === 'pending_review');

            if (pendingProjects.length === 0) {
                container.innerHTML = `
                    <div class="fade-in bg-white rounded-2xl border border-slate-200 shadow-sm p-12 text-center">
                        <div class="w-20 h-20 bg-slate-50 text-slate-300 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fa-solid fa-check-double text-4xl"></i>
                        </div>
                        <h3 class="text-xl font-bold text-slate-800 mb-2">Semua Sudah Direview</h3>
                        <p class="text-slate-500">Tidak ada pengajuan update dari customer yang menunggu persetujuan.</p>
                    </div>
                `;
                return;
            }

            let html = '<div class="fade-in grid grid-cols-1 gap-6">';
            
            pendingProjects.forEach(p => {
                const update = p.pendingUpdate;
                const submittedDate = new Date(update.submittedAt).toLocaleString('id-ID');
                
                html += `
                    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col md:flex-row">
                        <div class="p-6 md:w-1/3 bg-slate-50 border-r border-slate-200 flex flex-col justify-center">
                            <p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Customer</p>
                            <h3 class="text-lg font-black text-slate-900 mb-4">${p.customerName} (@${p.customerUsername})</h3>
                            
                            <p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Template Family</p>
                            <p class="text-sm font-bold text-brand-600 mb-4">${p.templateFamily === 'company_profile' ? 'Company Profile' : 'Export Catalog'}</p>
                            
                            <p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Waktu Submit</p>
                            <p class="text-sm text-slate-700">${submittedDate}</p>
                        </div>
                        <div class="p-6 md:w-2/3 flex flex-col">
                            <div class="flex-grow">
                                <h4 class="font-bold text-slate-800 mb-2">Ringkasan Perubahan:</h4>
                                <ul class="list-disc pl-5 text-sm text-slate-600 space-y-1 mb-6">
                                    <li>Bisnis: <strong class="text-slate-800">${update.content.businessName || '-'}</strong></li>
                                    <li>Hero Title: <strong class="text-slate-800">${update.content.heroTitle || '-'}</strong></li>
                                    <li>Jumlah Item: <strong class="text-slate-800">${p.templateFamily === 'company_profile' ? (update.content.services?.length || 0) + ' Layanan' : (update.content.products?.length || 0) + ' Produk'}</strong></li>
                                </ul>
                            </div>
                            <div class="flex gap-3 mt-auto pt-4 border-t border-slate-100">
                                <button onclick="rejectUpdate('${p.id}')" class="px-5 py-2.5 bg-white border border-slate-300 text-slate-700 font-bold rounded-xl text-sm hover:bg-red-50 hover:text-red-600 hover:border-red-200 transition">Tolak Update</button>
                                <button onclick="approveUpdate('${p.id}')" class="px-5 py-2.5 bg-brand-600 text-white font-bold rounded-xl text-sm hover:bg-brand-700 shadow-md transition flex items-center gap-2"><i class="fa-solid fa-check"></i> Setujui & Publish</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            container.innerHTML = html;
        }

        window.approveUpdate = function(projectId) {
            const projects = window.loadCustomerProjects();
            const idx = projects.findIndex(p => p.id === projectId);
            if (idx === -1) return;
            
            const p = projects[idx];
            if (!p.pendingUpdate) return;

            if (confirm(`Setujui update untuk ${p.customerName}? Perubahan akan menjadi live.`)) {
                // Pindahkan konten ke liveContent
                p.liveContent = JSON.parse(JSON.stringify(p.pendingUpdate.content));
                
                // Tambahkan ke history
                if (!p.updateHistory) p.updateHistory = [];
                p.updateHistory.push({
                    approvedAt: new Date().toISOString(),
                    approvedBy: 'admin',
                    contentSnapshot: JSON.parse(JSON.stringify(p.liveContent))
                });

                // Hapus pending update
                p.pendingUpdate = null;

                window.saveCustomerProjects(projects);
                alert('Update disetujui dan telah di-publish.');
                updateBadgeStatus();
                renderPendingUpdates(document.getElementById('content-area'));
            }
        };

        window.rejectUpdate = function(projectId) {
            const projects = window.loadCustomerProjects();
            const idx = projects.findIndex(p => p.id === projectId);
            if (idx === -1) return;
            
            const p = projects[idx];
            if (!p.pendingUpdate) return;

            const reason = prompt(`Masukkan alasan penolakan untuk ${p.customerName}:`, "Konten tidak sesuai pedoman");
            if (reason !== null) {
                p.pendingUpdate.status = 'rejected';
                p.pendingUpdate.rejectionReason = reason;

                window.saveCustomerProjects(projects);
                alert('Update ditolak.');
                updateBadgeStatus();
                renderPendingUpdates(document.getElementById('content-area'));
            }
        };

        function updateBadgeStatus() {
            const projects = window.loadCustomerProjects ? window.loadCustomerProjects() : [];
            const pendingCount = projects.filter(p => p.pendingUpdate && p.pendingUpdate.status === 'pending_review').length;
            const badge = document.getElementById('pending-badge');
            
            if (pendingCount > 0) {
                badge.innerText = pendingCount + ' New';
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        // Initialize App
        updateBadgeStatus();
        switchTab('dashboard');
    </script>
</body>
</html>
